<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Кибербезопасность: Тест</title>
    <link rel="stylesheet" href="css/page3.css" />
  </head>
  <body>
    <script src="./js/page3.js"></script>
    <div class="game-container">
      <div id="intro-screen">
        <img
          src="./assets/img/robot.svg"
          alt="Кибер-робот"
          class="main-robot"
        />

        <div class="robot-bubble anim-loop-1">
          Твоя миссия: <br>Стань Кибер-Аудитором! Найди скрытые <br>утечки данных в постах вымышленного <br>пользователя и обезвредь их, пока <br>мошенники не успели ими воспользоваться.
        </div>

        <div class="robot-bubble anim-loop-2">
          Принимаем тебя в ряды экспертов. Нажимай на кнопку, чтобы разобрать
          первое сообщение. Помни: мошенники хитры!
        </div>

        <button class="play-game" onclick="startGame()">ИГРАТЬ</button>
      </div>

      
  </body>
</html>
